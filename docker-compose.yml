version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 — Multi-tenant database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saas_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-accounting_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-accounting_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - saas_network

  # ─────────────────────────────────────────────
  # Redis 7 — Caching & Celery broker
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas_network

  # ─────────────────────────────────────────────
  # Django REST API
  # ─────────────────────────────────────────────
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile.django
    container_name: saas_django
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - saas_network

  # ─────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nextjs
    container_name: saas_nextjs
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - saas_network

  # ─────────────────────────────────────────────
  # Celery Worker — Background tasks
  # ─────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.django
    container_name: saas_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      - django
    networks:
      - saas_network

  # ─────────────────────────────────────────────
  # Celery Beat — Scheduled tasks
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.django
    container_name: saas_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - django
    networks:
      - saas_network

# ═══════════════════════════════════════════════
# Named Volumes
# ═══════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_files:
    driver: local

# ═══════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════
networks:
  saas_network:
    driver: bridge
